name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同じブランチで PR が連続更新されたとき、古い実行を自動キャンセルする。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check internal links use RelativeLink
        run: node tests/check-relative-paths.test.mjs

      - name: Build
        env:
          # ビルドだけ通すためのスタブ。実 API には接続せず、
          # microcms.ts の env チェックを通過させるためだけに使う。
          # 実 API を叩く E2E は別ジョブで secrets を必要とする。
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN || 'stub-domain' }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY || 'stub-api-key-for-build-only' }}
        run: npm run build

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit (high+)
        run: npm audit --audit-level=high

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-build
    # MICROCMS シークレットがあるときだけ E2E を走らせる。
    # スタブでビルドした静的サイトに対して E2E を当てても、MicroCMS 連携部分の
    # 描画が失敗してテストが安定しないため、実 API キーが必須。
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          CI: 'true'
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN || 'stub-domain' }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY || 'stub-api-key-for-build-only' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
